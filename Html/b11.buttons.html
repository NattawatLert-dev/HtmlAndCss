<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
</head>
<body>

    <a href="https://www.google.com" target="_blank">
    <button onclick="doSomething()" style="font-size: 25px; background-color: grey; color: blue; border-radius: 6px;">click me</button>
    </a>

    <p id="greeting">Hello</p>
    
    <script>
        function doSomething(){
            document.getElementById("greeting").innerHTML = "Goobye";
        }
    </script>
    
</body>
</html>
