<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 

    display = คุณสมบัติ (property) ที่ใช้กำหนดว่า
              Element จะแสดงผลอย่างไร

    block-level = เริ่มต้นบนบรรทัดใหม่เสมอ
                  และใช้พื้นที่ความกว้างทั้งหมดที่มีอยู่
                  (เช่น h1, div, p, form, header, footer)

    inline = ไม่ขึ้นบรรทัดใหม่
             ความกว้างของ Element จะมีเท่าที่จำเป็นต่อเนื้อหาภายใน
             (เช่น span, a, img)

    -->
             

    <div>div</div>
    <span>span</span>
    
</body>
</html>
