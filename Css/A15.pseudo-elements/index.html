<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
    Pseudo Elements (::) = คีย์เวิร์ดที่เพิ่มต่อท้าย Selector
                           ใช้สำหรับกำหนดสไตล์ให้กับส่วนเฉพาะของ Element

    selector::pseudo-element

    ::before        = แทรกเนื้อหาก่อน Element
    ::after         = แทรกเนื้อหาหลัง Element
    ::first-letter  = กำหนดสไตล์ให้ตัวอักษรตัวแรก
    ::first-line    = กำหนดสไตล์ให้บรรทัดแรก
    ::selection     = กำหนดสไตล์ให้ข้อความที่ถูกเลือก
    ::placeholder   = กำหนดสไตล์ให้ข้อความ Placeholder ใน Input
    ::marker        = กำหนดสไตล์ให้สัญลักษณ์รายการ (•, 1., เป็นต้น)
    ::file-selector-button = กำหนดสไตล์ให้ปุ่มอัปโหลดไฟล์
    ::backdrop      = กำหนดสไตล์ให้พื้นหลังด้านหลัง Dialog หรือ Element แบบ Fullscreen
    -->

    <h1>Hello</h1>

    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Sit modi voluptates, eligendi aspernatur impedit quam itaque! Labore earum autem reiciendis obcaecati, architecto et eligendi sunt molestias iure perferendis officia minus?</p>

    <ul id="fruit">
        <li id="apple">apple</li>
        <li id="orange">orange</li>
        <li id="banana">banana</li>
    </ul>
    
</body>
</html>
